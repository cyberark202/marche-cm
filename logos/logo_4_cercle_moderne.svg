<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="240" height="280">
  <defs>
    <linearGradient id="cgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#067A55"/>
      <stop offset="50%" stop-color="#0EA877"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCD116"/>
      <stop offset="50%" stop-color="#CE1126"/>
      <stop offset="100%" stop-color="#067A55"/>
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#067A55" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Main circle background -->
  <circle cx="120" cy="115" r="90" fill="url(#cgrad)" filter="url(#shadow4)"/>

  <!-- Inner white ring -->
  <circle cx="120" cy="115" r="75" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Letter M (bold, white, centered) -->
  <text x="120" y="148" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="100"
        fill="white">M</text>

  <!-- Cameroon color arc at bottom of circle -->
  <path d="M 46 155 A 90 90 0 0 0 194 155"
        fill="none" stroke="#FCD116" stroke-width="5"
        stroke-linecap="round" opacity="0"/>

  <!-- Three color dots inside circle (Cameroon flag) -->
  <circle cx="88" cy="165" r="5" fill="#007A5E" opacity="0.85"/>
  <circle cx="120" cy="165" r="5" fill="#CE1126" opacity="0.85"/>
  <circle cx="152" cy="165" r="5" fill="#FCD116" opacity="0.85"/>

  <!-- Star above M -->
  <polygon points="120,45 123,55 133,55 126,61 128,72 120,66 112,72 114,61 107,55 117,55"
           fill="white" opacity="0.9"/>

  <!-- App name below -->
  <text x="120" y="238" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="22" letter-spacing="3"
        fill="#067A55">MARCHÉ CM</text>
  <text x="120" y="260" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="11" letter-spacing="4"
        fill="#0EA877">MARKETPLACE</text>
</svg>
