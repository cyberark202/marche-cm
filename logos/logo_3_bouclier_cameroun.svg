<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="240" height="280">
  <defs>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <clipPath id="shieldClip">
      <path d="M120 25 L205 60 L205 145 Q205 195 120 220 Q35 195 35 145 L35 60 Z"/>
    </clipPath>
  </defs>

  <!-- Shield shape with drop shadow -->
  <path d="M120 25 L205 60 L205 145 Q205 195 120 220 Q35 195 35 145 L35 60 Z"
        fill="#007A5E" filter="url(#shadow3)"/>

  <!-- Cameroon flag vertical stripes inside shield -->
  <rect x="35" y="25" width="57" height="200" fill="#007A5E" clip-path="url(#shieldClip)"/>
  <rect x="92" y="25" width="57" height="200" fill="#CE1126" clip-path="url(#shieldClip)"/>
  <rect x="149" y="25" width="57" height="200" fill="#FCD116" clip-path="url(#shieldClip)"/>

  <!-- Shine overlay -->
  <path d="M120 25 L205 60 L205 145 Q205 195 120 220 Q35 195 35 145 L35 60 Z"
        fill="url(#shine)"/>

  <!-- Bold M letter -->
  <text x="120" y="160" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="95"
        fill="white" opacity="0.95">M</text>

  <!-- Cameroon star -->
  <polygon points="120,52 123.5,63 135,63 126,70 129,81 120,74 111,81 114,70 105,63 116.5,63"
           fill="#FCD116"/>

  <!-- App name -->
  <text x="120" y="246" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="22" letter-spacing="3"
        fill="#007A5E">MARCHÉ CM</text>
  <text x="120" y="268" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="11" letter-spacing="4"
        fill="#CE1126">MARKETPLACE</text>
</svg>
