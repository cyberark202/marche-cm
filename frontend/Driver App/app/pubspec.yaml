name: driver_app
description: "Market CM Driver — Application pour livreurs et coursiers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management (Riverpod)
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  cached_network_image: ^3.4.1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # WebSocket
  web_socket_channel: ^3.0.1

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Media / uploads
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Connectivity
  connectivity_plus: ^6.0.0

  # Local storage (non-sensitive UI prefs only)
  shared_preferences: ^2.3.2

  # NB: Firebase retiré — non utilisé dans lib/ et le plugin web
  # firebase_messaging_web plantait l'app web (CDN Google injoignable ici).
  # Les notifications passent par WebSocket. Réintroduire si push mobile requis.

  # UI
  google_fonts: ^6.2.1
  animations: ^2.0.11
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  country_picker: ^2.0.27

  # Utils
  intl: ^0.20.2
  crypto: ^3.0.6

  # Localization (MaterialLocalizations / CupertinoLocalizations fr)
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
