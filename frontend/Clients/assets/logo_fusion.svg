<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 310" width="260" height="310">
  <defs>

    <!-- Arrowhead marker -->
    <marker id="aw" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0,0 9,4.5 0,9 2,4.5" fill="rgba(255,255,255,0.88)"/>
    </marker>

    <!-- Background radial gradient (deep green → emerald, like Option 4) -->
    <radialGradient id="bg" cx="38%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#12B880"/>
      <stop offset="55%"  stop-color="#067A55"/>
      <stop offset="100%" stop-color="#023D2C"/>
    </radialGradient>

    <!-- CM text gradient (Cameroon flag: white → red → yellow, readable on green) -->
    <linearGradient id="cmG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="48%"  stop-color="#FFDDDD"/>
      <stop offset="75%"  stop-color="#FF7070"/>
      <stop offset="100%" stop-color="#FCD116"/>
    </linearGradient>

    <!-- Gold ring gradient -->
    <linearGradient id="goldR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFE169"/>
      <stop offset="50%"  stop-color="#FCD116"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>

    <!-- Shine overlay (Option 4 gloss) -->
    <radialGradient id="shine" cx="28%" cy="20%" r="58%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for circle -->
    <filter id="dshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#023D2C" flood-opacity="0.5"/>
    </filter>

    <!-- Star glow -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ── CIRCLE ────────────────────────────────────── -->

  <!-- Gold outer ring (shadow base) -->
  <circle cx="130" cy="122" r="103" fill="url(#goldR)" filter="url(#dshadow)"/>

  <!-- Dark green border -->
  <circle cx="130" cy="122" r="99"  fill="#023D2C"/>

  <!-- Main gradient fill -->
  <circle cx="130" cy="122" r="95"  fill="url(#bg)"/>

  <!-- Gloss overlay (Option 4 style) -->
  <circle cx="130" cy="122" r="95"  fill="url(#shine)"/>

  <!-- Inner ring accent -->
  <circle cx="130" cy="122" r="76"  fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.5"/>

  <!-- ── CAMEROON FLAG STRIPE BAND (subtle) ────────── -->
  <!-- Three thin arcs at the bottom of circle, as a decorative stripe -->
  <path d="M 57,173 A 80,80 0 0,0 103,205" fill="none" stroke="#007A5E" stroke-width="4.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 103,205 A 80,80 0 0,0 157,205" fill="none" stroke="#CE1126" stroke-width="4.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 157,205 A 80,80 0 0,0 203,173" fill="none" stroke="#FCD116" stroke-width="4.5" stroke-linecap="round" opacity="0.6"/>

  <!-- ── TRADE ARROWS (existing logo concept) ──────── -->

  <!-- Arrow 1: top arc, pointing → (rightward) -->
  <!-- Semicircle from left to right, passing over the top of the circle -->
  <path d="M 68,120 A 62,62 0 0,0 192,120"
        fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="5.5"
        stroke-linecap="round" marker-end="url(#aw)"/>

  <!-- Arrow 2: bottom arc, pointing ← (leftward) -->
  <!-- Semicircle from right to left, passing under the bottom -->
  <path d="M 192,124 A 62,62 0 0,1 68,124"
        fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="5.5"
        stroke-linecap="round" marker-end="url(#aw)"/>

  <!-- ── CM TEXT (Option 4 bold center + flag gradient) -->
  <text x="130" y="147" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
        font-weight="900" font-size="72" letter-spacing="-2"
        fill="url(#cmG)">CM</text>

  <!-- ── STAR (Cameroon emblem, Option 4 accent) ──── -->
  <polygon
    points="130,48 134,60 146,60 137,68 140,80 130,72 120,80 123,68 114,60 126,60"
    fill="#FCD116" filter="url(#starGlow)"/>

  <!-- ── TEXT BELOW ─────────────────────────────────── -->
  <text x="130" y="256" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
        font-weight="800" font-size="20" letter-spacing="2.5"
        fill="#023D2C">CENTRAL MARKET</text>

  <text x="130" y="278" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="10.5" letter-spacing="2"
        fill="#067A55">Vente &amp; Achat · Cameroun</text>

</svg>
