name: marche_cm
description: Frontend Flutter pour marketplace B2B/B2C avec 4 types de compte
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  web_socket_channel: ^3.0.1
  # http kept for WebSocket upgrade compatibility; all REST calls use dio.
  http: ^1.2.2
  video_player: ^2.9.2
  file_picker: ^8.1.2
  google_sign_in: ^6.2.1
  # shared_preferences is NOT used for auth tokens — see flutter_secure_storage.
  # It may remain for non-sensitive UI preferences only.
  shared_preferences: ^2.3.2
  country_picker: ^2.0.27
  url_launcher: ^6.2.6
  lucide_icons: ^0.257.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # ── Connectivity & video compression ────────────────────────────────────────
  # Detects WiFi vs mobile data to decide compression level before video upload.
  connectivity_plus: ^6.0.0
  # Compresses video before upload on mobile connections (Android/iOS only).
  video_compress: ^3.1.3

  # ── Security packages ───────────────────────────────────────────────────────
  # Replaces raw http for REST calls: interceptors, retry, timeout.
  dio: ^5.7.0
  # Tokens stored in Android Keystore / iOS Keychain — never SharedPreferences.
  flutter_secure_storage: ^9.2.2

  # ── Push notifications ───────────────────────────────────────────────────────
  # Requires google-services.json (Android) and GoogleService-Info.plist (iOS).
  # See: https://firebase.google.com/docs/flutter/setup
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/app_icon_source.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon_source.png"
    background_color: "#FFFFFF"
    theme_color: "#15803D"
  windows:
    generate: true
    image_path: "assets/app_icon_source.png"
    icon_size: 256
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/payment/mtn.png
    - assets/payment/orange.png
    - assets/logo_fusion.svg
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/Poppins-BlackItalic.ttf
          weight: 900
          style: italic
