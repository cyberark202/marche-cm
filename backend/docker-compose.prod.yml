version: "3.9"

x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: config.settings
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

x-backend-base: &backend-base
  image: marche-cm:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: Dockerfile

  restart: unless-stopped

  environment:
    <<: *common-env

    SECRET_KEY: ${SECRET_KEY}
    DATABASE_URL: ${DATABASE_URL}

    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1

    ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}

    DEBUG: "False"
    SECURE_SSL_REDIRECT: "True"

    DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
    DATA_ENCRYPTION_FALLBACK_KEYS: ${DATA_ENCRYPTION_FALLBACK_KEYS:-}
    DEVICE_FINGERPRINT_SECRET: ${DEVICE_FINGERPRINT_SECRET}

    NOTCHPAY_ENABLED: ${NOTCHPAY_ENABLED:-False}
    NOTCHPAY_MODE: ${NOTCHPAY_MODE:-test}
    NOTCHPAY_PUBLIC_KEY: ${NOTCHPAY_PUBLIC_KEY}
    NOTCHPAY_PRIVATE_KEY: ${NOTCHPAY_PRIVATE_KEY}
    NOTCHPAY_WEBHOOK_TOKEN: ${NOTCHPAY_WEBHOOK_TOKEN}

    NOTCHPAY_AUTO_PAYOUT: ${NOTCHPAY_AUTO_PAYOUT:-False}
    NOTCHPAY_MTN_NUMBER: ${NOTCHPAY_MTN_NUMBER}
    NOTCHPAY_ORANGE_NUMBER: ${NOTCHPAY_ORANGE_NUMBER}

    MFA_ISSUER_NAME: ${MFA_ISSUER_NAME:-Marche CM}

    JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-15}
    JWT_REFRESH_TOKEN_DAYS: ${JWT_REFRESH_TOKEN_DAYS:-7}

  depends_on:
    redis:
      condition: service_healthy

  networks:
    - internal

  cap_drop:
    - ALL

  security_opt:
    - no-new-privileges:true

services:

  redis:
    image: redis:7-alpine

    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes

    volumes:
      - redis_data:/data

    networks:
      - internal

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    <<: *backend-base

    command: >
      daphne
      -b 0.0.0.0
      -p 8000
      --access-log -
      --proxy-headers
      config.asgi:application

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  nginx:
    image: nginx:1.27-alpine

    restart: unless-stopped

    depends_on:
      - web

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./staticfiles:/app/staticfiles:ro
      - ${TLS_CERT_PATH:-./certs}:/etc/nginx/certs:ro

    networks:
      - internal
      - external

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  finops-retries:
    <<: *backend-base

    command: >
      sh -c "while true; do
        python manage.py run_financial_ops --skip-reconciliation --max-retries 200;
        sleep 180;
      done"

    restart: unless-stopped

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
    internal: true

  external:
    driver: bridge