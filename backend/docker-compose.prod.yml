# Production docker-compose — hardened deployment.
#
# Security properties:
#   - All containers run as non-root
#   - Read-only filesystems where possible
#   - No privileged mode, no host network
#   - Secrets via environment (ideally Vault/K8s secrets in production)
#   - Internal network only — only Nginx exposed to host
#   - Health checks on every service
#   - Resource limits (prevent DoS via resource exhaustion)

version: "3.9"

x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: config.settings
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

x-backend-base: &backend-base
  image: marche-cm:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    <<: *common-env
    SECRET_KEY: ${SECRET_KEY}
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
    DEBUG: "False"
    SECURE_SSL_REDIRECT: "True"
    DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
    DEVICE_FINGERPRINT_SECRET: ${DEVICE_FINGERPRINT_SECRET}
    NOTCHPAY_ENABLED: ${NOTCHPAY_ENABLED:-False}
    NOTCHPAY_MODE: ${NOTCHPAY_MODE:-test}
    NOTCHPAY_PUBLIC_KEY: ${NOTCHPAY_PUBLIC_KEY}
    NOTCHPAY_PRIVATE_KEY: ${NOTCHPAY_PRIVATE_KEY}
    NOTCHPAY_WEBHOOK_TOKEN: ${NOTCHPAY_WEBHOOK_TOKEN}
    NOTCHPAY_AUTO_PAYOUT: ${NOTCHPAY_AUTO_PAYOUT:-False}
    NOTCHPAY_MTN_NUMBER: ${NOTCHPAY_MTN_NUMBER}
    NOTCHPAY_ORANGE_NUMBER: ${NOTCHPAY_ORANGE_NUMBER}
    MFA_ISSUER_NAME: ${MFA_ISSUER_NAME:-Marche CM}
    JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-15}
    JWT_REFRESH_TOKEN_DAYS: ${JWT_REFRESH_TOKEN_DAYS:-7}
    SECURITY_HARD_BLOCK_SCANNERS: "True"
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - internal
  # No capabilities needed — drop all.
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  # Resource limits — prevent runaway processes.
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 1G
      reservations:
        cpus: "0.5"
        memory: 256M

services:
  # ── Database ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Enforce TLS for all client connections.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --protected-mode yes
      --bind 0.0.0.0
      --loglevel notice
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 300M

  # ── Django ASGI (web) ─────────────────────────────────────────────────────
  web:
    <<: *backend-base
    command: >
      daphne
      -b 0.0.0.0
      -p 8000
      --access-log -
      --proxy-headers
      config.asgi:application
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./staticfiles:/app/staticfiles:ro
      - ${TLS_CERT_PATH:-./certs}:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - internal
      - external
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required to bind ports 80/443
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Celery worker (financial ops) ─────────────────────────────────────────
  # worker:
  #   <<: *backend-base
  #   command: celery -A config worker --loglevel=info --concurrency=2

  # ── Payout retry cron ─────────────────────────────────────────────────────
  finops-retries:
    <<: *backend-base
    restart: unless-stopped
    command: >
      sh -c "while true; do
        python manage.py run_financial_ops --skip-reconciliation --max-retries 200;
        sleep 180;
      done"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_www:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true   # No external access — only via nginx
  external:
    driver: bridge
