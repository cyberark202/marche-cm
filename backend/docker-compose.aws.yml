# Production AWS — EC2 (VPS) + RDS PostgreSQL managé + S3 média.
#
# Différences avec docker-compose.prod.yml :
#   - PAS de service `db` : la base est AWS RDS (managé). DATABASE_URL pointe
#     vers l'endpoint RDS et DB_SSLMODE=require force le TLS.
#   - Les médias (KYC, preuves de livraison, images produit) vont sur S3 via
#     USE_S3_STORAGE=True + AWS_* (django-storages / boto3).
#   - Redis reste conteneurisé sur l'EC2 (option : ElastiCache — voir le doc).
#
# Sécurité : conteneurs non-root, cap_drop ALL, no-new-privileges, réseau
# interne, seul nginx exposé. Renseigner les secrets via le fichier .env.aws
# (jamais committé) ou un gestionnaire de secrets (SSM Parameter Store / Vault).
#
#   docker compose -f docker-compose.aws.yml --env-file .env.aws up -d --build

version: "3.9"

x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: config.settings
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

x-backend-base: &backend-base
  image: marche-cm:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    <<: *common-env
    SECRET_KEY: ${SECRET_KEY}
    # ── Base de données : AWS RDS PostgreSQL (managé) ──────────────────────
    DATABASE_URL: ${DATABASE_URL}          # postgres://USER:PASS@<rds-endpoint>:5432/DBNAME
    DB_SSLMODE: ${DB_SSLMODE:-require}     # TLS obligatoire vers RDS
    DB_SSLROOTCERT: ${DB_SSLROOTCERT:-}    # (optionnel) bundle CA RDS pour verify-full
    DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
    TRUST_PRIVATE_PROXIES: ${TRUST_PRIVATE_PROXIES:-True}
    LOADTEST_BYPASS_TOKEN: ${LOADTEST_BYPASS_TOKEN:-}
    DEBUG: "False"
    SECURE_SSL_REDIRECT: "True"
    USE_X_FORWARDED_PROTO: "True"
    DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
    DATA_ENCRYPTION_FALLBACK_KEYS: ${DATA_ENCRYPTION_FALLBACK_KEYS:-}
    DEVICE_FINGERPRINT_SECRET: ${DEVICE_FINGERPRINT_SECRET}
    # ── Stockage médias : S3 ───────────────────────────────────────────────
    USE_S3_STORAGE: "True"
    REQUIRE_REMOTE_PROOF_STORAGE: "True"
    AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
    AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}   # ex: dXXXX.cloudfront.net (CDN)
    AWS_S3_SIGNATURE_VERSION: ${AWS_S3_SIGNATURE_VERSION:-s3v4}
    AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH:-False}
    # ── Paiements NotchPay ─────────────────────────────────────────────────
    NOTCHPAY_ENABLED: ${NOTCHPAY_ENABLED:-True}
    NOTCHPAY_MODE: ${NOTCHPAY_MODE:-live}
    NOTCHPAY_PUBLIC_KEY: ${NOTCHPAY_PUBLIC_KEY}
    NOTCHPAY_PRIVATE_KEY: ${NOTCHPAY_PRIVATE_KEY}
    NOTCHPAY_CHECKOUT_WEBHOOK_SECRET: ${NOTCHPAY_CHECKOUT_WEBHOOK_SECRET}
    NOTCHPAY_DISBURSE_WEBHOOK_SECRET: ${NOTCHPAY_DISBURSE_WEBHOOK_SECRET}
    NOTCHPAY_WEBHOOK_TOKEN: ${NOTCHPAY_WEBHOOK_TOKEN:-}
    NOTCHPAY_AUTO_PAYOUT: ${NOTCHPAY_AUTO_PAYOUT:-False}
    NOTCHPAY_MTN_NUMBER: ${NOTCHPAY_MTN_NUMBER:-}
    NOTCHPAY_ORANGE_NUMBER: ${NOTCHPAY_ORANGE_NUMBER:-}
    # ── Email (OTP step-up + notifications) ────────────────────────────────
    EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
    EMAIL_HOST: ${EMAIL_HOST}
    EMAIL_PORT: ${EMAIL_PORT:-587}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@marche-cm.com}
    # JWT RS256 (obligatoire en prod). SIGNING/VERIFYING = PEM multi-lignes
    # injectés via l'environnement shell (voir _redeploy_ssm.sh), pas le .env.
    JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
    JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
    JWT_VERIFYING_KEY: ${JWT_VERIFYING_KEY:-}
    JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-15}
    JWT_REFRESH_TOKEN_DAYS: ${JWT_REFRESH_TOKEN_DAYS:-7}
    SECURITY_HARD_BLOCK_SCANNERS: "True"
  depends_on:
    redis:
      condition: service_healthy
  networks:
    # internal : pour joindre redis (isolé). external : pour joindre la RDS
    # (hors du réseau Docker) + résolution DNS. La BD étant managée (RDS), le
    # tier applicatif a besoin d'une sortie réseau.
    - internal
    - external
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 1G
      reservations:
        cpus: "0.5"
        memory: 256M

services:
  # ── Redis (sur l'EC2) ───────────────────────────────────────────────────
  # Option managée : ElastiCache for Redis — alors retirer ce service et
  # pointer REDIS_URL/CACHE_URL vers l'endpoint ElastiCache (TLS rediss://).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --appendonly yes
      --protected-mode yes
      --bind 0.0.0.0
      --loglevel notice
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_drop:
      - ALL
    cap_add:
      # L'entrypoint redis abandonne les privilèges root->redis via setpriv :
      # nécessite SETUID/SETGID (sinon "setresuid failed", exit 127).
      - SETUID
      - SETGID
      # Audit ref: [INFRA-P0-002] l'entrypoint (root) fait `find/chown` sur
      # /data ; appendonlydir est créé 700 par l'uid redis au premier boot →
      # sans DAC_OVERRIDE root ne peut plus le traverser et le conteneur
      # boucle en crash à la PREMIÈRE recréation. CHOWN requis pour la même
      # étape d'entrypoint.
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 300M

  # ── Django ASGI ───────────────────────────────────────────────────────────
  web:
    <<: *backend-base
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 --access-log - --proxy-headers config.asgi:application"
    healthcheck:
      # En-têtes nécessaires : SECURE_SSL_REDIRECT redirige le http -> https
      # (X-Forwarded-Proto), et localhost doit être dans ALLOWED_HOSTS.
      test: ["CMD", "curl", "-fsS", "-H", "X-Forwarded-Proto: https", "-H", "Host: localhost", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/aws/container/marche-cm"
        awslogs-region: "eu-north-1"
        awslogs-stream: "web"
        awslogs-create-group: "true"

  # ── Nginx (TLS + reverse proxy) ────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./staticfiles:/app/staticfiles:ro
      - ${TLS_CERT_PATH:-./certs}:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - internal
      - external
    cap_drop:
      - ALL
    cap_add:
      # nginx (master root) doit chown ses dossiers cache et démarrer ses
      # workers sous l'uid nginx : CHOWN/SETUID/SETGID/DAC_OVERRIDE requis.
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/aws/container/marche-cm"
        awslogs-region: "eu-north-1"
        awslogs-stream: "nginx"
        awslogs-create-group: "true"

  # ── Payout retry cron ───────────────────────────────────────────────────
  finops-retries:
    <<: *backend-base
    restart: unless-stopped
    # Worker de fond (pas de serveur HTTP) : le healthcheck hérité de l'image
    # (curl :8000) n'a pas de sens ici.
    healthcheck:
      disable: true
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "while true; do
        python manage.py run_financial_ops --skip-reconciliation --max-retries 200;
        sleep 180;
      done"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/aws/container/marche-cm"
        awslogs-region: "eu-north-1"
        awslogs-stream: "finops-retries"
        awslogs-create-group: "true"

  # ── Celery workers + beat ─────────────────────────────────────────────────
  # Audit ref: [INFRA-P0-001] la prod ne lançait AUCUN worker/beat Celery —
  # auto-release escrow, outbox temps réel, SLA litiges, réconciliation
  # wallet↔ledger et push FCM asynchrones n'étaient jamais exécutés.
  # Routage : celery_app.py → queues default / financial (c=1, série) / outbox.
  worker-default:
    <<: *backend-base
    healthcheck:
      disable: true
    command: >
      celery -A celery_app worker -Q default,outbox -c 2
      --max-tasks-per-child 200 --loglevel INFO
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/aws/container/marche-cm"
        awslogs-region: "eu-north-1"
        awslogs-stream: "worker-default"
        awslogs-create-group: "true"

  worker-financial:
    <<: *backend-base
    healthcheck:
      disable: true
    # c=1 obligatoire : la file financial sérialise les opérations monétaires.
    command: >
      celery -A celery_app worker -Q financial -c 1
      --max-tasks-per-child 100 --loglevel INFO
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/aws/container/marche-cm"
        awslogs-region: "eu-north-1"
        awslogs-stream: "worker-financial"
        awslogs-create-group: "true"

  beat:
    <<: *backend-base
    healthcheck:
      disable: true
    # --pidfile= : /app est en lecture seule pour appuser ; l'état du
    # scheduler vit dans PostgreSQL (DatabaseScheduler), pas sur disque.
    command: >
      celery -A celery_app beat
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile= --loglevel INFO
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/aws/container/marche-cm"
        awslogs-region: "eu-north-1"
        awslogs-stream: "beat"
        awslogs-create-group: "true"

volumes:
  redis_data:
    driver: local
  certbot_www:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
