# Nginx — production hardening for Marche CM API
#
# Security properties:
#   - TLS 1.3 only (TLS 1.2 as minimum for older Android clients)
#   - HSTS with preload
#   - Strict cipher suites with PFS (ECDHE only)
#   - Rate limiting at edge (before Django sees the request)
#   - Request size limits
#   - Security headers (CSP, X-Frame-Options, etc.)
#   - Hidden server version
#   - Blocked known attack paths
#   - WebSocket proxy hardening

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Limit worker open files to prevent FD exhaustion attacks.
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Server hardening ────────────────────────────────────────────────────
    server_tokens off;                          # Hide Nginx version
    # NOTE : more_clear_headers exige le module ngx_headers_more (absent de
    # nginx:1.27-alpine). Décommenter uniquement avec une image qui l'inclut,
    # sinon nginx refuse de démarrer.
    # more_clear_headers Server;
    # more_clear_headers X-Powered-By;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;                   # Global upload limit (per-path overridden below)

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    # PFS-only, no 3DES, no RC4, no export ciphers.
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;                    # No session ticket resumption (ticket key rotation complexity)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Logging ─────────────────────────────────────────────────────────────
    # Log format with correlation ID and upstream timing.
    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time ut=$upstream_response_time '
                        'cid=$http_x_correlation_id';
    access_log /var/log/nginx/access.log security;

    # ── Rate limiting zones ─────────────────────────────────────────────────
    # Shared memory zones — survive across worker processes.
    limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/m;
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/m;
    limit_req_status 429;

    # Connection limiting — prevent slow-loris
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream (Django/Daphne) ─────────────────────────────────────────────
    upstream django_backend {
        # Conteneur applicatif (service compose "web"), résolu par le DNS Docker.
        server web:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME challenge (Let's Encrypt) — only exception to HTTPS redirect.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name cm.digital-get.com;          # Domaine API AWS (Let's Encrypt)

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # HSTS — 2-year duration, include subdomains, preload
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # ── Global rate limiting ──────────────────────────────────────────
        limit_req zone=global burst=20 nodelay;
        limit_conn conn_limit 20;

        # ── Block known attack paths ──────────────────────────────────────
        location ~* (\.(git|env|htaccess|htpasswd|bak|backup|sql|swp|log)|wp-admin|wp-login|phpinfo|\.aws|\.ssh|actuator|console) {
            return 404;
        }

        # ── Auth endpoints — strict rate limiting ─────────────────────────
        location ~ ^/api/(auth|accounts/login|accounts/register|accounts/token) {
            limit_req zone=auth burst=3 nodelay;
            client_max_body_size 1m;
            proxy_pass http://django_backend;
            include /etc/nginx/proxy_params;
        }

        # ── Upload endpoints ──────────────────────────────────────────────
        location ~ ^/api/(compliance|catalog) {
            limit_req zone=uploads burst=5 nodelay;
            client_max_body_size 25m;
            proxy_pass http://django_backend;
            include /etc/nginx/proxy_params;
        }

        # ── Webhook endpoints — higher limit, no burst ────────────────────
        location ~ ^/api/wallets/notchpay/ {
            limit_req zone=webhook burst=50 nodelay;
            client_max_body_size 2m;
            proxy_pass http://django_backend;
            include /etc/nginx/proxy_params;
        }

        # ── WebSocket endpoints ───────────────────────────────────────────
        location ~ ^/ws/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # ── Health check — no rate limiting, no auth ─────────────────────
        location = /api/health/ {
            proxy_pass http://django_backend;
            include /etc/nginx/proxy_params;
            access_log off;
        }

        # ── All other API endpoints ───────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://django_backend;
            include /etc/nginx/proxy_params;
        }

        # ── Static files — served directly by Nginx ───────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Deny direct media access — use signed S3 URLs in production.
        location /media/ {
            return 403;
        }

        # ── Default — reject anything not matched above ───────────────────
        location / {
            return 404;
        }
    }
}
