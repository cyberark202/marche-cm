name: 🚀 Deploy to Production (SSM + Terraform)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_terraform:
        description: "Skip Terraform apply (code-only deploy)"
        required: false
        default: "false"

permissions:
  id-token: write    # OIDC token
  contents: read
  deployments: write

env:
  AWS_REGION: eu-north-1
  INSTANCE_ID: i-09e104c1cd49c757e
  DOMAIN: cm.digital-get.com

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. BUILD: Code bundle + prepare
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: 📦 Build & prepare deployment
    runs-on: ubuntu-latest
    outputs:
      bundle_hash: ${{ steps.bundle.outputs.hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Dockerfile
        run: docker build --no-cache backend --progress=plain --target base 2>&1 | head -50

      - name: Create code bundle
        id: bundle
        run: |
          HASH=$(git rev-parse --short HEAD)
          tar czf /tmp/deploy-${HASH}.tar.gz \
            --exclude='.git' \
            --exclude='**/__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.env*' \
            --exclude='*.pem' \
            --exclude='*.ppk' \
            --exclude='infra/terraform/.terraform' \
            --exclude='infra/terraform/*.tfstate*' \
            --exclude='infra/terraform/inventory' \
            --exclude='backend/staticfiles' \
            --exclude='backend/media' \
            backend infra
          echo "hash=${HASH}" >> $GITHUB_OUTPUT
          ls -lh /tmp/deploy-${HASH}.tar.gz

      - name: Upload bundle to S3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push to S3
        run: |
          HASH=${{ steps.bundle.outputs.hash }}
          aws s3 cp /tmp/deploy-${HASH}.tar.gz \
            s3://market-cm/deploy/code-${HASH}.tar.gz \
            --region ${{ env.AWS_REGION }}
          echo "✅ Bundle uploaded: s3://market-cm/deploy/code-${HASH}.tar.gz"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. DEPLOY: via SSM send-command (pas de SSH!)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🔧 Deploy via SSM
    runs-on: ubuntu-latest
    environment: production
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM send-command
        id: ssm_deploy
        run: |
          HASH=${{ needs.build.outputs.bundle_hash }}
          PARAMS=$(cat <<EOF
          {
            "commands": [
              "export PATH=\$PATH:/usr/local/bin:/snap/bin",
              "cd /opt/marche-cm",
              "aws s3 cp s3://market-cm/deploy/code-${HASH}.tar.gz /tmp/code.tar.gz --region ${{ env.AWS_REGION }}",
              "tar xzf /tmp/code.tar.gz -C /opt/marche-cm",
              "bash infra/deploy/_deploy_ssm.sh"
            ]
          }
          EOF
          )

          CID=$(aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --document-name AWS-RunShellScript \
            --comment "GitHub Actions deploy (${HASH})" \
            --parameters "${PARAMS}" \
            --query Command.CommandId \
            --output text)

          echo "CommandId: $CID"
          echo "command_id=$CID" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        run: |
          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --region ${{ env.AWS_REGION }} \
              --command-id ${{ steps.ssm_deploy.outputs.command_id }} \
              --instance-id ${{ env.INSTANCE_ID }} \
              --query Status --output text 2>/dev/null || echo Pending)
            echo "[$i/120] Status: $STATUS"
            case "$STATUS" in
              Success) echo "✅ Deployment succeeded"; break ;;
              Failed|Cancelled|TimedOut) echo "❌ Deployment failed: $STATUS"; exit 1 ;;
            esac
            sleep 5
          done

      - name: Show deployment logs
        if: always()
        run: |
          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --region ${{ env.AWS_REGION }} \
            --command-id ${{ steps.ssm_deploy.outputs.command_id }} \
            --instance-id ${{ env.INSTANCE_ID }} \
            --query StandardOutputContent --output text

          echo ""
          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --region ${{ env.AWS_REGION }} \
            --command-id ${{ steps.ssm_deploy.outputs.command_id }} \
            --instance-id ${{ env.INSTANCE_ID }} \
            --query StandardErrorContent --output text || true

  # ──────────────────────────────────────────────────────────────────────────
  # 3. TERRAFORM: Infrastructure as Code
  # ──────────────────────────────────────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    needs: deploy
    if: ${{ github.event.inputs.skip_terraform != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infra/terraform
        run: |
          terraform plan -out=tfplan -no-color
          terraform show -json tfplan | jq '.resource_changes[] | select(.change.actions[] == "create" or .change.actions[] == "update") | {address, actions}' | head -30

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve -no-color tfplan
          terraform output -json > /tmp/tf-outputs.json

      - name: Show outputs
        run: |
          echo "=== Terraform Outputs ==="
          cat /tmp/tf-outputs.json | jq . || true

  # ──────────────────────────────────────────────────────────────────────────
  # 4. VERIFICATION: Health checks + smoke tests
  # ──────────────────────────────────────────────────────────────────────────
  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy, terraform]
    if: always()
    steps:
      - name: API Health Check
        run: |
          echo "Checking https://${{ env.DOMAIN }}/api/health/"
          for i in {1..12}; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' https://${{ env.DOMAIN }}/api/health/ 2>/dev/null || echo 000)
            echo "[$i/12] HTTP $CODE"
            [ "$CODE" = "200" ] && echo "✅ API healthy" && exit 0
            sleep 10
          done
          echo "❌ API health check failed"
          exit 1

      - name: Verify JWT signing
        run: |
          JWT=$(curl -s https://${{ env.DOMAIN }}/api/auth/login/ -X POST \
            -H 'Content-Type: application/json' \
            -d '{}' | jq -r '.access' 2>/dev/null || echo "")
          if [ -z "$JWT" ]; then
            echo "⚠️ JWT generation test (expected, no creds provided)"
          else
            echo "✅ JWT endpoint responding"
          fi

      - name: Deployment Summary
        run: |
          cat <<'EOF'

          ╔══════════════════════════════════════════════════════════════════╗
          ║                 ✅ DEPLOYMENT COMPLETE                           ║
          ╚══════════════════════════════════════════════════════════════════╝

          📊 Deployment Summary
          ─────────────────────────────────────────────────────────────────
          • Branch: ${{ github.ref }}
          • Commit: ${{ github.sha }}
          • Deployed: ${{ github.event.head_commit.author.name }} (${{ github.event.head_commit.author.email }})
          • Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          🔒 Security
          ─────────────────────────────────────────────────────────────────
          ✅ OIDC authentication (no static AWS credentials)
          ✅ SSM send-command (no SSH keys exposed)
          ✅ Secrets in Parameter Store (encrypted with KMS)
          ✅ Infrastructure as Code (Terraform)

          🔗 Resources
          ─────────────────────────────────────────────────────────────────
          API: https://${{ env.DOMAIN }}/api/health/

          ❓ Logs
          ─────────────────────────────────────────────────────────────────
          Check CloudWatch Logs for detailed deployment logs:
          • /aws/ec2/marche-cm-deployment
          • /aws/ssm/command-invocations

          EOF

  # ──────────────────────────────────────────────────────────────────────────
  # 5. ROLLBACK: On failure only
  # ──────────────────────────────────────────────────────────────────────────
  rollback:
    name: 🔄 Automatic Rollback
    runs-on: ubuntu-latest
    needs: [deploy, terraform]
    if: failure() && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback via SSM
        run: |
          PARAMS=$(cat <<EOF
          {
            "commands": [
              "cd /opt/marche-cm",
              "git fetch origin main:main",
              "git checkout main",
              "bash infra/deploy/_deploy_ssm.sh"
            ]
          }
          EOF
          )

          CID=$(aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --document-name AWS-RunShellScript \
            --comment "GitHub Actions rollback" \
            --parameters "${PARAMS}" \
            --query Command.CommandId \
            --output text)

          echo "Rollback CommandId: $CID"

      - name: Alert on failure
        run: |
          echo "❌ Deployment FAILED - Automatic rollback initiated"
          echo "Check CloudWatch logs for details"
          exit 1
